<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a1010"/>
      <stop offset="100%" style="stop-color:#3d0808"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- 枠線 -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#c0392b" stroke-width="2"/>
  <!-- 廃 文字 -->
  <text
    x="32" y="48"
    font-family="'Yu Gothic','Meiryo','Hiragino Kaku Gothic Pro','sans-serif'"
    font-size="42"
    font-weight="900"
    fill="#f6ad55"
    text-anchor="middle"
    filter="url(#glow)"
  >廃</text>
</svg>
